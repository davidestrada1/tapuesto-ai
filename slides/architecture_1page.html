<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tapuesto.ai — System Architecture</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117; 
            color: #c9d1d9;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .diagram-container {
            width: 100%;
            max-width: 1200px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            padding: 50px;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #58a6ff;
            font-size: 2.2em;
            margin: 0 0 12px 0;
            letter-spacing: -0.03em;
        }

        .header p.subtitle {
            color: #8b949e;
            font-size: 1.1em;
            margin: 0 0 8px 0;
            font-weight: 600;
        }
        
        .header p.description {
            color: #8b949e;
            font-size: 0.9em;
            margin: 0 auto;
            max-width: 700px;
            line-height: 1.5;
            opacity: 0.8;
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
        }

        /* --- Animations (Slowed down by 30%) --- */
        @keyframes dash {
            to { stroke-dashoffset: -24; }
        }

        @keyframes pulseGlow {
            0% { filter: drop-shadow(0 0 5px rgba(88, 166, 255, 0.2)); }
            50% { filter: drop-shadow(0 0 15px rgba(88, 166, 255, 0.5)); }
            100% { filter: drop-shadow(0 0 5px rgba(88, 166, 255, 0.2)); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Node Styles --- */
        .node-bg { fill: #21262d; stroke: #30363d; stroke-width: 2; rx: 10; }
        .node-bg.primary { stroke: #58a6ff; animation: pulseGlow 5s infinite; }
        .node-bg.ai { stroke: #3fb950; }
        .node-bg.db { stroke: #d2a8ff; }
        
        .node-title { fill: #f0f6fc; font-weight: 800; font-size: 16px; }
        .node-desc { fill: #8b949e; font-size: 12.5px; }
        .phase-title { fill: #a5d6ff; font-weight: 800; font-size: 14px; letter-spacing: 0.5px; text-transform: uppercase; }
        .badge-text { fill: #ffffff; font-size: 11px; font-weight: 600; }
        .flow-text { fill: #8b949e; font-size: 11px; font-style: italic; font-weight: 600; }

        /* --- Flow Lines --- */
        .packet-stream {
            fill: none;
            stroke-width: 3;
            stroke-dasharray: 8 16;
            animation: dash 1.5s linear infinite; /* Increased duration for slower animation */
        }

        .stream-blue { stroke: #58a6ff; }
        .stream-green { stroke: #3fb950; }
        .stream-purple { stroke: #d2a8ff; }
        
        .static-line { stroke: #30363d; stroke-width: 2; fill: none; }

        /* Sequential Reveal (Delays extended by 30%) */
        .step-1 { animation: fadeIn 0.8s ease forwards; opacity: 0; animation-delay: 0.3s; }
        .step-2 { animation: fadeIn 0.8s ease forwards; opacity: 0; animation-delay: 1.5s; }
        .step-3 { animation: fadeIn 0.8s ease forwards; opacity: 0; animation-delay: 2.8s; }
        .step-4 { animation: fadeIn 0.8s ease forwards; opacity: 0; animation-delay: 4.1s; }

    </style>
</head>
<body>

<div class="diagram-container">
    <div class="header">
        <h1>tapuesto.ai | System Architecture</h1>
        <p class="subtitle">The Prediction Market for People</p>
        <p class="description">From initial wagers to verified internet outcomes. A comprehensive loop that records bets, checks the web for winners, tracks if losers pay, and builds a gamified reputation leaderboard.</p>
    </div>

    <svg viewBox="0 0 1100 750" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M0,0 L10,5 L0,10 z" fill="#58a6ff" />
            </marker>
            <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M0,0 L10,5 L0,10 z" fill="#3fb950" />
            </marker>
            <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M0,0 L10,5 L0,10 z" fill="#d2a8ff" />
            </marker>
        </defs>

        <!-- STATIC BACKGROUND WIRES -->
        <path d="M 220 320 L 290 320 L 290 340 L 360 340" class="static-line" />
        <path d="M 220 440 L 290 440 L 290 400 L 360 400" class="static-line" />
        <path d="M 620 320 L 700 320 L 700 240 L 780 240" class="static-line" />
        <path d="M 880 160 L 880 100 L 750 100" class="static-line" />
        <path d="M 620 420 L 700 420 L 700 540 L 780 540" class="static-line" />

        <!-- STEP 1: The Users -->
        <g class="step-1">
            <text x="40" y="260" class="phase-title">Phase 1: Bet Placed</text>
            
            <!-- User 1 -->
            <rect x="40" y="280" width="180" height="80" class="node-bg" />
            <text x="60" y="305" class="node-title">👤 Player 1</text>
            <text x="60" y="325" class="node-desc">Proposes the wager</text>
            <text x="60" y="345" class="node-desc">Sets deadline & stakes</text>
            
            <!-- User 2 -->
            <rect x="40" y="400" width="180" height="80" class="node-bg" />
            <text x="60" y="425" class="node-title">👥 Player 2</text>
            <text x="60" y="445" class="node-desc">Accepts the challenge</text>
            <text x="60" y="465" class="node-desc">Locks in the bet</text>

            <!-- Animated Flow -->
            <path d="M 220 320 L 290 320 L 290 340 L 360 340" class="packet-stream stream-blue" marker-end="url(#arrow-blue)" />
            <path d="M 220 440 L 290 440 L 290 400 L 360 400" class="packet-stream stream-blue" marker-end="url(#arrow-blue)" />
            <text x="240" y="312" class="flow-text">Submit Market</text>
            <text x="240" y="470" class="flow-text">Join Market</text>
        </g>

        <!-- STEP 2: The React Client -->
        <g class="step-2">
            <rect x="360" y="270" width="260" height="200" class="node-bg primary" />
            <text x="380" y="310" class="node-title">⚛️ React Client</text>
            <text x="380" y="330" class="node-desc">Vite + TypeScript UI</text>
            <text x="380" y="350" class="node-desc">Manages the active duel interface</text>
            
            <!-- Business Logic Badges -->
            <rect x="380" y="375" width="220" height="26" rx="4" fill="#1f2428" stroke="#58a6ff" />
            <text x="395" y="392" class="badge-text" fill="#58a6ff">Market Creation & Lobby</text>
            
            <rect x="380" y="415" width="220" height="26" rx="4" fill="#1f2428" stroke="#58a6ff" />
            <text x="395" y="432" class="badge-text" fill="#58a6ff">Proof Settlement Interface</text>
        </g>

        <!-- STEP 3: Gemini Validation & Web Search -->
        <g class="step-3">
            <text x="780" y="140" class="phase-title">Phase 2: Evaluate Web</text>
            
            <!-- Gemini Box -->
            <rect x="780" y="160" width="280" height="150" class="node-bg ai" />
            <text x="800" y="195" class="node-title">🤖 Gemini API</text>
            <text x="800" y="215" class="node-desc">gemini-3-flash-preview</text>
            <text x="800" y="240" class="node-desc">Transforms vague user ideas</text>
            <text x="800" y="260" class="node-desc">into strict YES/NO binaries.</text>
            <text x="800" y="280" class="node-desc">Evaluates outcomes at deadline.</text>

            <!-- Search Grounding -->
            <rect x="520" y="60" width="230" height="80" class="node-bg ai" />
            <text x="540" y="90" class="node-title">🌐 Google Search</text>
            <text x="540" y="110" class="node-desc">Checks the internet to see</text>
            <text x="540" y="130" class="node-desc">who actually wins the bet.</text>

            <!-- Flow Lines -->
            <path d="M 620 320 L 700 320 L 700 240 L 780 240" class="packet-stream stream-green" marker-end="url(#arrow-green)" />
            <text x="625" y="312" class="flow-text">Validate & Format</text>
            
            <path d="M 880 160 L 880 100 L 750 100" class="packet-stream stream-green" marker-end="url(#arrow-green)" />
        </g>

        <!-- STEP 4: Database / Gamification -->
        <g class="step-4">
            <text x="780" y="420" class="phase-title">Phase 3: Gamification</text>
            
            <!-- Output to DB -->
            <path d="M 620 420 L 700 420 L 700 540 L 780 540" class="packet-stream stream-purple" marker-end="url(#arrow-purple)" />
            <text x="625" y="412" class="flow-text">Write to Ledger</text>
            
            <rect x="780" y="440" width="280" height="250" class="node-bg db" />
            <text x="800" y="475" class="node-title">🗄️ Supabase DB</text>
            <text x="800" y="495" class="node-desc">Records the final resolution</text>
            <text x="800" y="515" class="node-desc">Tracks if the loser paid up</text>
            
            <!-- Gamification Rules -->
            <rect x="800" y="540" width="240" height="24" rx="4" fill="#2d2238" />
            <text x="815" y="556" class="badge-text" fill="#d2a8ff">🏆 Update Gamified Leaderboard</text>
            
            <rect x="800" y="575" width="240" height="24" rx="4" fill="#2d2238" />
            <text x="815" y="591" class="badge-text" fill="#d2a8ff">📊 Recalculate User Win Rate</text>
            
            <rect x="800" y="610" width="240" height="24" rx="4" fill="#2d2238" />
            <text x="815" y="626" class="badge-text" fill="#d2a8ff">🥇 Compare against Peers</text>

            <rect x="800" y="645" width="240" height="24" rx="4" fill="#2d2238" />
            <text x="815" y="661" class="badge-text" fill="#d2a8ff">💳 Adjust Payer Score (Reliability)</text>
        </g>
    </svg>
</div>

</body>
</html>
