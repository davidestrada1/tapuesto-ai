<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tapuesto.ai — System Architecture</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117; /* Deep GitHub Dark */
            color: #c9d1d9;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .diagram-container {
            width: 100%;
            max-width: 1100px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            padding: 40px;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #58a6ff;
            font-size: 2em;
            margin: 0 0 10px 0;
            letter-spacing: -0.03em;
        }

        .header p {
            color: #8b949e;
            font-size: 0.9em;
            margin: 0;
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
        }

        /* --- Animations --- */
        @keyframes dash {
            to { stroke-dashoffset: -20; }
        }

        @keyframes pulseGlow {
            0% { filter: drop-shadow(0 0 5px rgba(88, 166, 255, 0.2)); }
            50% { filter: drop-shadow(0 0 15px rgba(88, 166, 255, 0.6)); }
            100% { filter: drop-shadow(0 0 5px rgba(88, 166, 255, 0.2)); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Node Styles --- */
        .node-bg { fill: #21262d; stroke: #30363d; stroke-width: 2; rx: 8; }
        .node-bg.primary { stroke: #58a6ff; animation: pulseGlow 4s infinite; }
        .node-bg.ai { stroke: #3fb950; }
        .node-bg.db { stroke: #d2a8ff; }
        
        .node-title { fill: #f0f6fc; font-weight: 800; font-size: 16px; }
        .node-desc { fill: #8b949e; font-size: 12px; }
        .badge-text { fill: #ffffff; font-size: 10px; font-weight: 600; }

        /* --- Flow Lines --- */
        .flow-line {
            fill: none;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        
        /* The animated packets */
        .packet-stream {
            fill: none;
            stroke-width: 3;
            stroke-dasharray: 8 12;
            animation: dash 1s linear infinite;
        }

        .stream-blue { stroke: #58a6ff; }
        .stream-green { stroke: #3fb950; }
        .stream-purple { stroke: #d2a8ff; }
        
        .static-line { stroke: #30363d; stroke-width: 2; fill: none; }

        /* Sequential Reveal */
        .step-1 { animation: fadeIn 0.5s ease forwards; opacity: 0; animation-delay: 0.2s; }
        .step-2 { animation: fadeIn 0.5s ease forwards; opacity: 0; animation-delay: 1.0s; }
        .step-3 { animation: fadeIn 0.5s ease forwards; opacity: 0; animation-delay: 1.8s; }
        .step-4 { animation: fadeIn 0.5s ease forwards; opacity: 0; animation-delay: 2.6s; }

    </style>
</head>
<body>

<div class="diagram-container">
    <div class="header">
        <h1>tapuesto.ai | System Architecture</h1>
        <p>AI-Powered Social Prediction Market Flow</p>
    </div>

    <svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M0,0 L10,5 L0,10 z" fill="#58a6ff" />
            </marker>
            <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M0,0 L10,5 L0,10 z" fill="#3fb950" />
            </marker>
            <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M0,0 L10,5 L0,10 z" fill="#d2a8ff" />
            </marker>
        </defs>

        <!-- STATIC BACKGROUND LINES -->
        <path d="M 180 300 L 350 300" class="static-line" />
        <path d="M 550 300 L 750 180" class="static-line" />
        <path d="M 850 120 L 850 60 L 750 60" class="static-line" />
        <path d="M 550 300 L 750 450" class="static-line" />

        <!-- STEP 1: The Users -->
        <g class="step-1">
            <!-- User 1 -->
            <rect x="30" y="220" width="150" height="60" class="node-bg" />
            <text x="50" y="245" class="node-title">Player 1</text>
            <text x="50" y="265" class="node-desc">Proposes Bet</text>
            
            <!-- User 2 -->
            <rect x="30" y="320" width="150" height="60" class="node-bg" />
            <text x="50" y="345" class="node-title">Player 2</text>
            <text x="50" y="365" class="node-desc">Accepts Challenge</text>

            <!-- Animated Inputs -->
            <path d="M 180 250 L 250 250 L 250 280 L 350 280" class="packet-stream stream-blue" marker-end="url(#arrow-blue)" />
            <path d="M 180 350 L 250 350 L 250 320 L 350 320" class="packet-stream stream-blue" marker-end="url(#arrow-blue)" />
        </g>

        <!-- STEP 2: The React Client -->
        <g class="step-2">
            <rect x="350" y="220" width="200" height="160" class="node-bg primary" />
            <text x="370" y="260" class="node-title">React Client</text>
            <text x="370" y="280" class="node-desc">Vite + TypeScript UI</text>
            
            <!-- Business Logic Badges -->
            <rect x="370" y="300" width="160" height="25" rx="4" fill="#1f2428" stroke="#58a6ff" />
            <text x="385" y="316" class="badge-text" fill="#58a6ff">1v1 Market Creation</text>
            
            <rect x="370" y="335" width="160" height="25" rx="4" fill="#1f2428" stroke="#58a6ff" />
            <text x="385" y="351" class="badge-text" fill="#58a6ff">Proof Settlement UI</text>

            <!-- Request to AI -->
            <path d="M 550 260 L 650 260 L 650 180 L 750 180" class="packet-stream stream-green" marker-end="url(#arrow-green)" />
        </g>

        <!-- STEP 3: Gemini Validation -->
        <g class="step-3">
            <rect x="750" y="120" width="200" height="120" class="node-bg ai" />
            <text x="770" y="155" class="node-title">Gemini API</text>
            <text x="770" y="175" class="node-desc">gemini-3-flash-preview</text>
            <text x="770" y="200" class="node-desc">Transforms vague ideas</text>
            <text x="770" y="215" class="node-desc">into strict YES/NO bets</text>

            <!-- Search Grounding -->
            <path d="M 850 120 L 850 60 L 750 60" class="packet-stream stream-green" />
            <rect x="550" y="30" width="200" height="60" class="node-bg ai" />
            <text x="570" y="55" class="node-title">Google Search</text>
            <text x="570" y="75" class="node-desc">Real-time Data Grounding</text>
        </g>

        <!-- STEP 4: Database / Reputation -->
        <g class="step-4">
            <!-- Output to DB -->
            <path d="M 550 340 L 650 340 L 650 450 L 750 450" class="packet-stream stream-purple" marker-end="url(#arrow-purple)" />
            
            <rect x="750" y="380" width="200" height="150" class="node-bg db" />
            <text x="770" y="415" class="node-title">Supabase</text>
            <text x="770" y="435" class="node-desc">PostgreSQL DB (Planned)</text>
            
            <!-- Gamification Rules -->
            <rect x="770" y="455" width="160" height="20" rx="4" fill="#2d2238" />
            <text x="780" y="468" class="badge-text" fill="#d2a8ff">Update ELO Rating</text>
            
            <rect x="770" y="480" width="160" height="20" rx="4" fill="#2d2238" />
            <text x="780" y="493" class="badge-text" fill="#d2a8ff">Recalculate Win Rate</text>
            
            <rect x="770" y="505" width="160" height="20" rx="4" fill="#2d2238" />
            <text x="780" y="518" class="badge-text" fill="#d2a8ff">Adjust Payer Score</text>
        </g>
    </svg>
</div>

</body>
</html>
